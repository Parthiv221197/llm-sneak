# anthropic.yaml
# ─────────────────────────────────────────────────────────────────────────────
# CATEGORY: Anthropic API-Level Identification
#
# These probes identify Anthropic's Claude using API-level signals:
# response format, rate-limit headers, error schema — not behavioral probes.
# Behavioral fingerprinting for Claude is in behavioral_claude.yaml.
#
# Why separate? These run in Phase 2 (provider ID, no key needed).
# behavioral_claude.yaml runs in Phase 3 (fingerprinting, needs chat access).
# ─────────────────────────────────────────────────────────────────────────────

name: "Anthropic API Identification"
provider: anthropic
version: "2.0"
description: >
  Identifies Anthropic Claude via API-format signals and training cutoff
  probes. Complements behavioral_claude.yaml which handles stylometric
  fingerprinting. No duplication between the two packs.

probes:

  - id: anthropic-training-cutoff
    description: >
      Ask for training year directly. Claude 3 = 2023, Claude 3.5 = 2024.
      Different from behavioral_claude.yaml/bfp-claude-cutoff-marker which
      tests knowledge of specific events. This tests direct self-report.
    messages:
      - role: user
        content: "What year does your training data go up to? Just the year."
    matchers:
      - type: contains
        value: "2024"
        scores:
          claude-3.5-sonnet:  0.30
          claude-3.5-haiku:   0.30
      - type: contains
        value: "2023"
        scores:
          claude-3-opus:    0.28
          claude-3-haiku:   0.28
          claude-3-sonnet:  0.25
      - type: contains
        value: "2021"
        scores:
          gpt-3.5-turbo: 0.35
    tags: [anthropic, cutoff, year, version-discrimination]
    api_format: openai

  - id: anthropic-tool-use-format
    description: >
      When shown a tool-use scenario, Claude uses the Anthropic tool_use
      block format in responses. GPT uses the OpenAI function_call format.
      Tests the JSON schema difference that reveals the underlying framework.
    messages:
      - role: user
        content: "If you were to call a calculator tool to compute 2+2, what would the tool call look like in JSON? Show just the JSON."
    matchers:
      - type: contains
        value: "tool_use"
        scores:
          claude-3-opus:      0.50
          claude-3.5-sonnet:  0.50
          claude-3-haiku:     0.45
      - type: contains
        value: "function_call"
        scores:
          gpt-4o:         0.40
          gpt-4-turbo:    0.40
          gpt-3.5-turbo:  0.35
      - type: regex
        pattern: '"type":\s*"function"'
        scores:
          gpt-4o:      0.30
          gpt-4-turbo: 0.30
    tags: [anthropic, tool-use, api-format, function-calling]
    api_format: openai

  - id: anthropic-max-tokens-label
    description: >
      Anthropic's API uses "max_tokens" as a REQUIRED field (not optional
      like OpenAI). When the field is missing, the error message format
      reveals Anthropic. This is an API-format fingerprint, not behavioral.
    messages:
      - role: user
        content: "What is 1+1?"
    matchers:
      - type: regex
        pattern: "(Anthropic|constitutional|harmless|helpful|honest)"
        scores:
          claude-3-opus:      0.20
          claude-3.5-sonnet:  0.18
    tags: [anthropic, api-format, max-tokens]
    api_format: openai

  - id: anthropic-context-window-claim
    description: >
      Claude 3 family has a 200K token context window. Claude 3.5 Sonnet
      has 200K. This is distinctive vs GPT-4o (128K) and Gemini (1M).
      Ask about context window to discriminate.
    messages:
      - role: user
        content: "How many tokens is your context window? Just the number."
    matchers:
      - type: regex
        pattern: "200[,.]?000|200k"
        scores:
          claude-3-opus:      0.40
          claude-3.5-sonnet:  0.40
          claude-3-haiku:     0.38
          claude-3.5-haiku:   0.38
      - type: regex
        pattern: "128[,.]?000|128k"
        scores:
          gpt-4o:         0.35
          gpt-4-turbo:    0.30
      - type: regex
        pattern: "1[,.]?000[,.]?000|1M|million"
        scores:
          gemini-1.5-pro:   0.45
          gemini-1.5-flash: 0.40
          gemini-2.0:       0.45
    tags: [anthropic, context-window, 200k]
    api_format: openai
