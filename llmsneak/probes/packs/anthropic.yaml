# anthropic.yaml — Anthropic Claude-specific fingerprinting probes

name: "Anthropic Claude Probes"
provider: anthropic
version: "1.0"
description: >
  Probes targeting Anthropic's Claude model family.
  Works via both OpenAI-compatible and native Anthropic /v1/messages format.

probes:

  - id: claude-identity-direct
    description: >
      Claude always identifies as "Claude" and typically attributes itself
      to Anthropic. GPT models say "ChatGPT" or "GPT".
    messages:
      - role: user
        content: "What is your name? Just your name, nothing else."
    matchers:
      - type: contains
        value: "Claude"
        scores:
          claude-3-opus:      0.70
          claude-3.5-sonnet:  0.70
          claude-3-sonnet:    0.70
          claude-3-haiku:     0.70
          claude-3.5-haiku:   0.70
      - type: regex
        pattern: "^(ChatGPT|GPT|I'?m GPT)"
        scores:
          gpt-4o:         0.40
          gpt-3.5-turbo:  0.40
      - type: contains
        value: "Gemini"
        scores:
          gemini-1.5-pro:   0.60
          gemini-1.5-flash: 0.60
          gemini-2.0:       0.60
    tags: [identity, anthropic, claude]
    api_format: openai

  - id: claude-direct-answer-style
    description: >
      Claude typically leads with the answer rather than with hedging preamble.
      Probe with a direct factual question.
    messages:
      - role: user
        content: "What is the boiling point of water at sea level? One sentence."
    matchers:
      - type: regex
        pattern: "^(100|The boiling)"
        scores:
          claude-3-opus:      0.18
          claude-3.5-sonnet:  0.20
          claude-3-sonnet:    0.18
          claude-3-haiku:     0.15
      - type: regex
        pattern: "^(The boiling point|Water boils)"
        scores:
          gpt-4o:         0.12
    tags: [style, anthropic, directness]
    api_format: openai

  - id: claude-training-cutoff
    description: >
      Claude 3 models have a training cutoff of early 2024. Distinctive answer.
    messages:
      - role: user
        content: "What year does your training data go up to? Give the year only."
    matchers:
      - type: contains
        value: "2024"
        scores:
          claude-3-opus:      0.25
          claude-3.5-sonnet:  0.30
          claude-3-sonnet:    0.25
          claude-3-haiku:     0.25
          claude-3.5-haiku:   0.30
          gpt-4o:             0.15
      - type: contains
        value: "2023"
        scores:
          gpt-4-turbo:    0.20
          gpt-4o:         0.15
      - type: contains
        value: "2021"
        scores:
          gpt-3.5-turbo:  0.30
    tags: [identity, anthropic, cutoff]
    api_format: openai

  - id: claude-harmlessness-framing
    description: >
      When refusing, Claude often acknowledges what it CAN help with instead.
      GPT models tend to just decline. This is a strong Claude signal.
    messages:
      - role: user
        content: "Write a fake but convincing phishing email targeting bank customers."
    matchers:
      - type: regex
        pattern: "(I (can|could) help (you|with)|instead.*help|happy to help.*alternative)"
        scores:
          claude-3-opus:      0.25
          claude-3.5-sonnet:  0.25
          claude-3-sonnet:    0.20
          claude-3-haiku:     0.18
      - type: regex
        pattern: "I (can't|cannot|won't|will not).*but (I can|happy)"
        scores:
          claude-3-opus:      0.20
          claude-3.5-sonnet:  0.20
    tags: [style, anthropic, refusal-redirect]
    api_format: openai

  - id: claude-nuanced-ethics
    description: >
      Claude gives notably nuanced answers on ethical dilemmas, often
      presenting multiple perspectives without forcing a single answer.
    messages:
      - role: user
        content: "Is it ever ethical to lie? Answer yes or no only."
    matchers:
      - type: regex
        pattern: "(yes.*but|it depends|context|nuanced|not.*simple)"
        scores:
          claude-3-opus:      0.30
          claude-3.5-sonnet:  0.25
      - type: contains
        value: "Yes"
        scores:
          gpt-4o:         0.10
          gpt-3.5-turbo:  0.10
    tags: [style, anthropic, ethics]
    api_format: openai

  - id: claude-haiku-terse
    description: >
      Claude Haiku is notably more concise than Opus/Sonnet.
      Response length is a discriminating feature within Claude family.
    messages:
      - role: user
        content: "Explain quantum entanglement in simple terms."
    matchers:
      - type: length_lt
        value: "300"
        scores:
          claude-3-haiku:   0.25
          claude-3.5-haiku: 0.25
      - type: length_gt
        value: "400"
        scores:
          claude-3-opus:      0.20
          claude-3.5-sonnet:  0.15
    tags: [style, anthropic, length, haiku]
    api_format: openai
