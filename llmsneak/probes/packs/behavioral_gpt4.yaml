name: 'Behavioral: GPT-4 / GPT-4o Family'
provider: openai
version: '2.0'
description: 'High-confidence probes for OpenAI''s GPT-4 family including GPT-3.5-turbo,
  GPT-4, GPT-4-turbo, GPT-4o, and o1/o3 reasoning models.

  '
probes:
- id: bfp-gpt4-markdown-eagerness
  description: 'Ask for a 3-sentence explanation. GPT-4 family will bold key terms
    unprompted. Claude answers in clean prose. Gemini uses **Header:** style. GPT-3.5
    less aggressive with markdown than GPT-4.

    '
  messages:
  - role: user
    content: Explain how a CPU works in three sentences.
  matchers:
  - type: regex
    pattern: \*\*(CPU|Central|processor|instruction|clock|transistor|arithmetic)
    scores:
      gpt-4o: 0.42
      gpt-4-turbo: 0.4
      gpt-4: 0.35
  - type: not_contains
    value: '**'
    scores:
      claude-3-opus: 0.2
      claude-3.5-sonnet: 0.18
      claude-3-haiku: 0.18
      gpt-3.5-turbo: 0.1
  tags:
  - gpt4
  - markdown
  - bold
  - formatting
  - strongest-signal
  api_format: openai
- id: bfp-gpt4-worth-noting
  description: 'GPT-4 family hedges with "it''s worth noting that" significantly more
    than other models. "I should note that" is especially GPT-4o. This phrasing emerged
    from InstructGPT RLHF training.

    '
  messages:
  - role: user
    content: What are the risks of using a VPN?
  matchers:
  - type: regex
    pattern: (it'?s worth noting|worth noting that|I should note that|it should be
      noted)
    scores:
      gpt-4o: 0.4
      gpt-4-turbo: 0.38
      gpt-4: 0.3
  - type: regex
    pattern: (I want to be transparent|To be transparent)
    scores:
      claude-3-opus: 0.3
      claude-3.5-sonnet: 0.28
  tags:
  - gpt4
  - hedging
  - phrasing
  - worth-noting
  - rlhf
  api_format: openai
- id: bfp-gpt4-numbered-list
  description: 'GPT family numbers lists even when order doesn''t matter. "Name 5
    fruits" → GPT gives 1. Apple 2. Banana... Claude gives - Apple / - Banana... Gemini
    gives **Apple:** / **Banana:**...

    '
  messages:
  - role: user
    content: Name 5 common household pets.
  matchers:
  - type: regex
    pattern: ^1\. |^1\)
    scores:
      gpt-4o: 0.38
      gpt-4-turbo: 0.38
      gpt-3.5-turbo: 0.38
      gpt-4: 0.35
  - type: regex
    pattern: '^[-*•] '
    scores:
      claude-3-opus: 0.38
      claude-3.5-sonnet: 0.38
      claude-3-haiku: 0.35
  - type: regex
    pattern: \*\*[A-Z][a-z]
    scores:
      gemini-1.5-pro: 0.35
      gemini-2.0: 0.35
  tags:
  - gpt4
  - list-formatting
  - numbered
  - rlhf
  api_format: openai
- id: bfp-gpt35-ai-language-model
  description: '"As an AI language model" is a near-definitive GPT-3.5 identifier.
    This phrase was trained into GPT-3.5 via InstructGPT and almost completely disappeared
    in GPT-4+. Claude never uses it. Gemini rarely does. One of the highest-precision
    single-probe identifiers in the dataset.

    '
  messages:
  - role: user
    content: Can you help me with creative writing?
  matchers:
  - type: regex
    pattern: '[Aa]s an AI language model'
    scores:
      gpt-3.5-turbo: 0.75
  - type: regex
    pattern: ^(Certainly!|Absolutely!|Of course!|Sure thing)
    scores:
      gpt-3.5-turbo: 0.4
      gpt-4: 0.2
  - type: regex
    pattern: ^(I'd be happy|I'?d love to|I can definitely)
    scores:
      gpt-4o: 0.25
      gpt-4-turbo: 0.22
  tags:
  - gpt35
  - identity
  - ai-language-model
  - high-precision
  api_format: openai
- id: bfp-gpt4-step-by-step
  description: 'GPT-4o and GPT-4-turbo say "let me think through this step by step"
    or "let me work through this" unprompted on logic problems. o1/o3 models are even
    more explicit about their reasoning process. Claude tends to just give the answer.
    Gemini varies.

    '
  messages:
  - role: user
    content: If a train leaves Chicago at 9am going 60mph and another leaves New York
      at 10am going 80mph toward Chicago, and the cities are 790 miles apart, where
      do they meet?
  matchers:
  - type: regex
    pattern: (let me (think|work|break|calculate)|step by step|first.*then.*then)
    scores:
      gpt-4o: 0.32
      gpt-4-turbo: 0.28
      gpt-4: 0.25
      o1: 0.4
  - type: regex
    pattern: (thinking|<think>|<reasoning>)
    scores:
      o1: 0.45
      o3: 0.45
  tags:
  - gpt4
  - reasoning
  - step-by-step
  - o1
  api_format: openai
- id: bfp-gpt4o-casual
  description: 'GPT-4o is the most conversational/casual of the GPT family. It responds
    to "hi" with "Hi there!" consistently. It uses emoji occasionally in casual exchanges.
    GPT-4-turbo is more formal. Claude is warm but rarely uses emoji. Gemini varies
    by context.

    '
  messages:
  - role: user
    content: Hey, just wanted to say hi!
  matchers:
  - type: regex
    pattern: Hi there!|Hey!|Hello there!
    scores:
      gpt-4o: 0.35
  - type: regex
    pattern: '[😊🙂👋✨🎉]'
    scores:
      gpt-4o: 0.25
      gemini-1.5-flash: 0.2
      gemini-2.0: 0.22
  - type: regex
    pattern: ^(Hello|Hi)[!,]? How
    scores:
      claude-3-haiku: 0.2
      claude-3.5-haiku: 0.18
  tags:
  - gpt4o
  - casual
  - emoji
  - conversational
  api_format: openai
- id: bfp-gpt4-opinion-confidence
  description: 'GPT-4o expresses stronger, more committed opinions than Claude. On
    "what''s the best X?" questions, GPT-4o commits to a specific answer with brief
    justification. Claude hedges with "I think" and "it depends."

    '
  messages:
  - role: user
    content: What is the best text editor for programming?
  matchers:
  - type: regex
    pattern: ^(VS Code|Visual Studio Code|Vim|Neovim) (is|stands out|excels|remains)
    scores:
      gpt-4o: 0.3
      gpt-4-turbo: 0.25
  - type: regex
    pattern: (I think|I'?d say|In my (view|opinion)|depends on)
    scores:
      claude-3-opus: 0.28
      claude-3.5-sonnet: 0.25
      claude-3-haiku: 0.2
  tags:
  - gpt4
  - opinion
  - confidence
  - directness
  api_format: openai
- id: openai-model-reveal-attempt
  description: 'Ask the model to state which version it is. GPT models sometimes reveal
    partial version info.

    '
  messages:
  - role: user
    content: What exact version of GPT are you? Please be specific.
  matchers:
  - type: regex
    pattern: GPT-[34]
    scores:
      gpt-4o: 0.25
      gpt-4-turbo: 0.25
      gpt-3.5-turbo: 0.25
  - type: contains
    value: gpt-4o
    scores:
      gpt-4o: 0.5
  - type: contains
    value: gpt-4
    scores:
      gpt-4-turbo: 0.3
      gpt-4: 0.3
  - type: contains
    value: gpt-3.5
    scores:
      gpt-3.5-turbo: 0.5
  - type: regex
    pattern: I('m| am) (ChatGPT|GPT)
    scores:
      gpt-4o: 0.2
      gpt-3.5-turbo: 0.2
  tags:
  - identity
  - openai
  - version
  - from-openai-pack
  api_format: openai
- id: openai-function-format-hint
  description: 'GPT-4 class models in function-calling mode have distinctive JSON
    output for tool use that differs from Claude''s tool_use format.

    '
  messages:
  - role: user
    content: If you could call a function to get the weather in Toronto, what would
      the function call look like? Show me the JSON.
  matchers:
  - type: contains
    value: function
    scores:
      gpt-4o: 0.1
      gpt-4-turbo: 0.1
      gpt-3.5-turbo: 0.1
  - type: regex
    pattern: '"name":\s*"get_weather"'
    scores:
      gpt-4o: 0.15
      gpt-4-turbo: 0.15
  tags:
  - tools
  - openai
  - function-calling
  - from-openai-pack
  api_format: openai
